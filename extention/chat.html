<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>دستیار هوشمند جیرای شما</title>
  <link rel="stylesheet" href="popup.css" />
  <style>
    :root {
      --bg-base: #0d0d14;
      --text-primary: #f1f0ff;
      --text-secondary: #9d9ab8;
      --text-muted: #5c5a72;
      --violet: #8b5cf6;
      --violet-dark: #6d28d9;
      --border: rgba(139,92,246,0.18);
      --border-bright: rgba(139,92,246,0.45);
      --success: #34d399;
    }

    body {
      width: 700px;
      min-height: 560px;
      overflow: hidden;
      margin: 0;
      padding: 0;
      background: var(--bg-base);
      font-family: Inter, system-ui, -apple-system, sans-serif;
      color: var(--text-primary);
    }

    .app-layout {
      height: 100%;
      display: flex;
      flex-direction: row;
      gap: 12px;
    }

    /* Messages container */
    .messages-container {
      flex: 1;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 12px;
      padding: 16px;
      -webkit-overflow-scrolling: touch;
    }

    /* Welcome block */
    .welcome-block {
      text-align: center;
      padding: 24px 16px;
      color: var(--text-muted);
    }

    .welcome-icon {
      font-size: 48px;
      margin-bottom: 16px;
    }

    .welcome-title {
      font-size: 18px;
      font-weight: 700;
      color: var(--text-primary);
      margin-bottom: 8px;
    }

    .welcome-sub {
      font-size: 13px;
      color: var(--text-secondary);
      margin-bottom: 16px;
      line-height: 1.5;
    }

    .suggestion-chips {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      justify-content: center;
    }

    .chip {
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid var(--border);
      color: var(--text-secondary);
      padding: 8px 12px;
      border-radius: 20px;
      font-size: 12px;
      cursor: pointer;
      transition: all 0.2s;
    }

    .chip:hover {
      background: rgba(139, 92, 246, 0.15);
      color: var(--violet);
      border-color: var(--border-bright);
    }

    /* Message bubbles */
    .message-row {
      display: flex;
      gap: 10px;
      align-items: flex-end;
      max-width: 100%;
      margin-bottom: 4px;
    }

    .message-row.user {
      justify-content: flex-end;
      flex-direction: row-reverse;
    }

    .message-row.bot {
      justify-content: flex-start;
    }

    .msg-avatar {
      width: 32px;
      height: 32px;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
      font-weight: 700;
      flex-shrink: 0;
    }

    .msg-avatar.user-av {
      background: linear-gradient(135deg, var(--violet), var(--violet-dark));
      color: white;
    }

    .msg-avatar.bot {
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid var(--border);
      color: var(--text-muted);
    }

    .msg-content {
      display: flex;
      flex-direction: column;
      gap: 4px;
      max-width: 75%;
    }

    .msg-bubble {
      padding: 12px 14px;
      border-radius: 16px;
      font-size: 13px;
      line-height: 1.5;
      word-wrap: break-word;
      border: 1px solid var(--border);
    }

    .message-row.user .msg-bubble {
      background: linear-gradient(135deg, rgba(139, 92, 246, 0.35), rgba(109, 40, 217, 0.25));
      color: white;
      border-color: rgba(139, 92, 246, 0.45);
      border-bottom-right-radius: 4px;
    }

    .message-row.bot .msg-bubble {
      background: rgba(255, 255, 255, 0.04);
      color: var(--text-primary);
      border-color: var(--border);
      border-bottom-left-radius: 4px;
    }

    .msg-time {
      font-size: 11px;
      color: var(--text-muted);
      padding: 0 4px;
    }

    /* Typing indicator */
    .typing-indicator {
      display: flex;
      gap: 10px;
      align-items: flex-end;
    }

    .typing-dots {
      display: flex;
      gap: 6px;
      padding: 12px 14px;
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid var(--border);
      border-radius: 16px;
      border-bottom-left-radius: 4px;
    }

    .typing-dots span {
      width: 6px;
      height: 6px;
      background: var(--violet);
      border-radius: 50%;
      animation: bounce 1.2s ease infinite;
    }

    .typing-dots span:nth-child(2) {
      animation-delay: 0.2s;
    }

    .typing-dots span:nth-child(3) {
      animation-delay: 0.4s;
    }

    @keyframes bounce {
      0%, 60%, 100% { transform: translateY(0); }
      30% { transform: translateY(-6px); }
    }

    /* Sidebar */
    .sidebar {
      width: 110px;
      flex-shrink: 0;
      display: flex;
      flex-direction: column;
      gap: 10px;
      padding: 12px;
      background: linear-gradient(180deg, rgba(255,255,255,0.02), transparent);
      border: 1px solid var(--border);
      border-radius: 12px;
      overflow-y: auto;
    }

    .sidebar-header {
      display: flex;
      flex-direction: column;
      gap: 8px;
      align-items: center;
      text-align: center;
    }

    .logo-mark {
      width: 34px;
      height: 34px;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, var(--violet), var(--violet-dark));
      font-size: 18px;
    }

    .app-name {
      font-weight: 700;
      font-size: 12px;
      color: var(--text-primary);
    }

    .app-sub {
      font-size: 10px;
      color: var(--text-muted);
    }

    .sidebar-section-label {
      font-size: 10px;
      font-weight: 600;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-top: 12px;
    }

    .project-pill, .user-pill, .session-info {
      font-size: 11px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
      color: var(--text-secondary);
    }

    .dot-pulse {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--violet);
      box-shadow: 0 0 8px var(--violet);
    }

    .mini-avatar {
      width: 28px;
      height: 28px;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, var(--violet), var(--violet-dark));
      color: white;
      font-weight: 700;
      font-size: 12px;
    }

    .mini-name, .mini-mobile {
      font-size: 10px;
      text-align: center;
      word-break: break-word;
    }

    .mini-name {
      color: var(--text-primary);
      font-weight: 600;
    }

    .mini-mobile {
      color: var(--text-muted);
    }

    .sidebar-spacer {
      flex: 1;
    }

    .sidebar-btn {
      width: 100%;
      padding: 8px;
      border-radius: 8px;
      border: none;
      background: transparent;
      color: var(--text-muted);
      cursor: pointer;
      font-weight: 600;
      font-size: 11px;
      transition: all 0.2s;
    }

    .sidebar-btn:hover {
      background: rgba(255, 255, 255, 0.04);
      color: var(--text-primary);
    }

    .sidebar-btn-danger {
      color: #ffb4b4;
    }

    .sidebar-btn-danger:hover {
      background: rgba(255, 179, 180, 0.1);
    }

    /* Chat main area */
    .chat-main {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .chat-topbar {
      padding: 10px 12px;
      border-bottom: 1px solid var(--border);
      background: rgba(13, 13, 20, 0.5);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      flex-shrink: 0;
    }

    .topbar-left {
      flex: 1;
    }

    .topbar-title {
      font-weight: 700;
      font-size: 14px;
      color: var(--text-primary);
    }

    .topbar-sub {
      font-size: 11px;
      color: var(--text-muted);
    }

    .topbar-right {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .status-indicator {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 11px;
      color: var(--text-muted);
    }

    .status-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--success);
    }

    /* Input area */
    .input-area {
      padding: 12px 16px;
      border-top: 1px solid var(--border);
      background: rgba(13, 13, 20, 0.8);
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .input-wrapper {
      display: flex;
      gap: 8px;
      align-items: flex-end;
    }

    .chat-textarea {
      flex: 1;
      min-height: 40px;
      max-height: 100px;
      padding: 10px 14px;
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid var(--border);
      border-radius: 12px;
      color: var(--text-primary);
      font-family: inherit;
      font-size: 13px;
      outline: none;
      resize: none;
      transition: all 0.2s;
    }

    .chat-textarea:focus {
      border-color: var(--border-bright);
      box-shadow: 0 0 0 3px rgba(139, 92, 246, 0.15);
    }

    .chat-textarea::placeholder {
      color: var(--text-muted);
    }

    .send-btn {
      width: 40px;
      height: 40px;
      border: none;
      border-radius: 10px;
      background: linear-gradient(135deg, var(--violet), var(--violet-dark));
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      flex-shrink: 0;
      transition: all 0.2s;
    }

    .send-btn:hover:not(:disabled) {
      transform: translateY(-2px);
      box-shadow: 0 4px 12px rgba(109, 40, 217, 0.3);
    }

    .send-btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .input-hint {
      font-size: 11px;
      color: var(--text-muted);
    }

    .input-hint kbd {
      background: rgba(255, 255, 255, 0.08);
      padding: 2px 6px;
      border-radius: 4px;
      font-family: monospace;
    }
  </style>
</head>
<body>
  <div class="bg-glow"></div>
  <div class="bg-grid"></div>

  <div class="app-layout">

    <!-- Sidebar -->
    <aside class="sidebar">
      <div class="sidebar-header">
        <div class="logo-mark">🤖</div>
        <div>
          <div class="app-name">Jira Agent</div>
          <div class="app-sub">AI Analytics</div>
        </div>
      </div>

      <div class="sidebar-section-label">Project</div>
      <div class="project-pill" id="sidebar-project">
        <span class="dot-pulse"></span>
        <span id="sidebar-project-name">Loading...</span>
      </div>

      <div class="sidebar-section-label" style="margin-top:20px;">Session</div>
      <div class="session-info" id="session-info">
        <span class="session-icon">💬</span>
        <span id="session-label">Session #1</span>
      </div>

      <div class="sidebar-section-label" style="margin-top:20px;">User</div>
      <div class="user-pill" id="sidebar-user">
        <div class="mini-avatar" id="sidebar-avatar">U</div>
        <div>
          <div class="mini-name" id="sidebar-name">Manager</div>
          <div class="mini-mobile" id="sidebar-mobile"></div>
        </div>
      </div>

      <div class="sidebar-spacer"></div>

      <button class="sidebar-btn" id="new-session-btn">＋ New Session</button>
      <button class="sidebar-btn sidebar-btn-danger" id="logout-btn">⏻ Logout</button>
    </aside>

    <!-- Main chat area -->
    <main class="chat-main">

      <!-- Top bar -->
      <div class="chat-topbar">
        <div class="topbar-left">
          <div class="topbar-title">Chat</div>
          <div class="topbar-sub" id="topbar-project-label">No project</div>
        </div>
        <div class="topbar-right">
          <div class="status-indicator">
            <span class="status-dot"></span>
            <span class="status-text">Connected</span>
          </div>
        </div>
      </div>

      <!-- Messages -->
      <div class="messages-container" id="messages-container">
        <div class="welcome-block" id="welcome-block">
          <div class="welcome-icon">🤖</div>
          <div class="welcome-title">Jira AI Agent</div>
          <div class="welcome-sub">در مورد پروژه خودتون از من سوال بپرسید، فقط کافیه توی صفحه پروژه لاگین باشید!.</div>
          <div class="suggestion-chips" id="suggestion-chips">
            <button class="chip">خلاصه اسپرینت ها</button>
            <button class="chip">چه کسی بیشترین مسائل باز را دارد؟</button>
            <button class="chip">تولید گزارش PDF</button>
            <button class="chip">نمایش نمودار شتاب</button>
          </div>
        </div>
      </div>

      <!-- Input area -->
      <div class="input-area">
        <div class="input-wrapper">
          <textarea
            id="chat-input"
            class="chat-textarea"
            placeholder="Ask about your Jira project..."
            rows="1"
          ></textarea>
          <button class="send-btn" id="send-btn" disabled>
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
              <line x1="22" y1="2" x2="11" y2="13"></line>
              <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
            </svg>
          </button>
        </div>
        <div class="input-hint">Press <kbd>Enter</kbd> to send · <kbd>Shift+Enter</kbd> for new line</div>
      </div>

    </main>
  </div>

  <script src="api.js"></script>
  <script src="ui.js"></script>
  <script src="chat.js"></script>
</body>
</html>
